<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Traila</title>
    
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- html2canvas для надежных скриншотов без белого фона -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-2: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
            --text-faint: rgba(255, 255, 255, 0.35);
            --accent: #c4f04d;
            --danger: #ff4757;
            --warning: #ffa502;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            letter-spacing: -0.02em;
        }
        
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #0a0a0b; /* Фолбэк, если карта грузится */
        }
        
        #map, #map * {
            pointer-events: auto !important;
        }
        
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }
        
        .screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 5;
        }
        
        #trackingScreen {
            justify-content: space-between;
        }
        
        .top-bar {
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 20;
            pointer-events: none;
        }
        
        .top-bar > * {
            pointer-events: auto;
        }
        
        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.04em;
            color: var(--text);
            text-shadow: 0 2px 16px rgba(0,0,0,0.8);
        }
        
        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .gps-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(10, 10, 11, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .gps-indicator.active { opacity: 1; }
        .gps-indicator.good { border-color: rgba(196, 240, 77, 0.3); }
        .gps-indicator.medium { border-color: rgba(255, 165, 2, 0.3); }
        .gps-indicator.bad { border-color: rgba(255, 71, 87, 0.3); }
        
        .gps-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 12px;
        }
        
        .gps-bar {
            width: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
        }
        
        .gps-bar:nth-child(1) { height: 4px; }
        .gps-bar:nth-child(2) { height: 7px; }
        .gps-bar:nth-child(3) { height: 10px; }
        .gps-bar:nth-child(4) { height: 12px; }
        
        .gps-indicator.good .gps-bar { background: var(--accent); }
        .gps-indicator.medium .gps-bar:nth-child(-n+3) { background: var(--warning); }
        .gps-indicator.bad .gps-bar:nth-child(-n+2) { background: var(--danger); }
        
        .gps-text {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .gps-indicator.good .gps-text { color: var(--accent); }
        .gps-indicator.medium .gps-text { color: var(--warning); }
        .gps-indicator.bad .gps-text { color: var(--danger); }
        
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.3s ease;
        }
        
        .rec-badge.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 12px var(--danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--danger); }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--danger); }
        }
        
        .rec-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 16px rgba(0,0,0,0.8);
        }
        
        .bottom-panel {
            position: relative;
            z-index: 20;
            padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .stats-bento {
            display: flex;
            gap: 8px;
        }
        
        .stat-tile {
            background: transparent;
            border-radius: 20px;
            padding: 16px;
            flex: 1;
        }
        
        .stat-tile.primary {
            flex: 1.2;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }
        
        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 32px;
            line-height: 1;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
        }
        
        .stat-tile.primary .stat-value {
            font-size: 48px;
        }
        
        .stat-unit {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
        }
        
        .stat-tile.primary .stat-unit {
            font-size: 16px;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            border: none;
            border-radius: 22px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        
        .btn:active { transform: scale(0.98); }
        
        .btn-primary {
            flex: 1;
            background: var(--accent);
            color: #0a0a0b;
            box-shadow: 0 10px 40px -10px var(--accent);
        }
        
        .btn-icon-only {
            width: 62px;
            flex: none;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text);
        }
        
        .btn-icon-only svg { width: 22px; height: 22px; }
        .btn-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .btn-icon svg { width: 100%; height: 100%; }
        
        #finishScreen {
            background: var(--bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: calc(env(safe-area-inset-top, 0px) + 16px) 0 calc(env(safe-area-inset-bottom, 0px) + 20px);
        }
        
        .finish-header {
            padding: 8px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .finish-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .card-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient(160deg, #0f0f14 0%, #1a0f24 50%, #0f0f14 100%);
            box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(196, 240, 77, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.2) 0%, transparent 40%);
            pointer-events: none;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 28px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }
        
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .card-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .card-brand-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .card-date {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            letter-spacing: 0.05em;
        }
        
        .card-map {
            flex: 1;
            margin: 20px 0;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            background: #0a0a0b;
            border: 1px solid rgba(255,255,255,0.08);
            min-height: 200px;
        }
        
        #cardMap { width: 100%; height: 100%; }
        .card-map .leaflet-control-attribution { display: none !important; }
        
        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .card-stat-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            opacity: 0.5;
            margin-bottom: 6px;
        }
        
        .card-stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 24px;
            letter-spacing: -0.03em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        
        .card-stat-unit {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            margin-left: 2px;
        }
        
        .actions {
            padding: 0 20px;
            display: flex;
            gap: 10px;
        }
        
        .btn-action {
            flex: 1;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-action:active { transform: scale(0.98); }
        
        .btn-save {
            background: var(--accent);
            color: #0a0a0b;
            flex: 1.5;
        }
        
        .btn-share {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 22px;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-strong);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.show { transform: translateX(-50%) translateY(0); }
        
        .toast-icon {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }
        
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 28px;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .matching-badge {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            padding: 16px 24px;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .matching-badge.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .matching-badge .spinner {
            width: 20px;
            height: 20px;
        }
        
        .matching-badge-text {
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="screen" id="trackingScreen">
        <div id="map"></div>
        
        <div class="top-bar">
            <div class="logo-text">TRAILA</div>
            <div class="top-right">
                <div class="gps-indicator" id="gpsIndicator">
                    <div class="gps-bars">
                        <div class="gps-bar"></div>
                        <div class="gps-bar"></div>
                        <div class="gps-bar"></div>
                        <div class="gps-bar"></div>
                    </div>
                    <span class="gps-text" id="gpsText">—</span>
                </div>
                <div class="rec-badge" id="recBadge">
                    <div class="rec-dot"></div>
                    <span class="rec-text">REC</span>
                </div>
            </div>
        </div>
        
        <div class="bottom-panel">
            <div class="stats-bento">
                <div class="stat-tile primary">
                    <div class="stat-label">Distance</div>
                    <div class="stat-value">
                        <span id="distance">0.00</span><span class="stat-unit">km</span>
                    </div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">Time</div>
                    <div class="stat-value"><span id="time">00:00</span></div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">Pace</div>
                    <div class="stat-value">
                        <span id="pace">—</span><span class="stat-unit">/km</span>
                    </div>
                </div>
            </div>
            
            <div class="btn-row" id="btnRowIdle">
                <button class="btn btn-primary" onclick="startTracking()">
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </span>
                    <span>Start</span>
                </button>
                <button class="btn btn-icon-only" onclick="recenterMap()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                        <line x1="12" y1="2" x2="12" y2="4"/>
                        <line x1="12" y1="20" x2="12" y2="22"/>
                        <line x1="2" y1="12" x2="4" y2="12"/>
                        <line x1="20" y1="12" x2="22" y2="12"/>
                    </svg>
                </button>
            </div>
            
            <div class="btn-row" id="btnRowActive" style="display:none">
                <button class="btn btn-primary" id="pauseBtn" onclick="togglePause()">
                    <span class="btn-icon" id="pauseIcon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
                    </span>
                    <span id="pauseLabel">Pause</span>
                </button>
                <button class="btn btn-icon-only" style="background: rgba(255, 71, 87, 0.2); border-color: rgba(255, 71, 87, 0.3);" onclick="finishTracking()">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="color: var(--danger);">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <div class="screen hidden" id="finishScreen">
        <div class="finish-header">
            <div class="finish-title">Activity Complete</div>
            <button class="close-btn" onclick="discardAndBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="card-wrapper">
            <div class="card" id="card">
                <div class="card-inner">
                    <div class="card-top">
                        <div class="card-brand">
                            <span class="card-brand-dot"></span>
                            <span>Traila</span>
                        </div>
                        <div class="card-date" id="cardDate">—</div>
                    </div>
                    
                    <div class="card-map">
                        <div id="cardMap"></div>
                        <div class="loading-overlay" id="cardLoading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    
                    <div class="card-stats">
                        <div>
                            <div class="card-stat-label">Distance</div>
                            <div class="card-stat-value">
                                <span id="cardDistance">0.00</span><span class="card-stat-unit">km</span>
                            </div>
                        </div>
                        <div>
                            <div class="card-stat-label">Time</div>
                            <div class="card-stat-value"><span id="cardTime">00:00</span></div>
                        </div>
                        <div>
                            <div class="card-stat-label">Pace</div>
                            <div class="card-stat-value">
                                <span id="cardPace">—</span><span class="card-stat-unit">/km</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-action btn-save" onclick="saveCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Save Image
            </button>
            <button class="btn-action btn-share" onclick="shareCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                Share
            </button>
        </div>
    </div>
    
    <div class="matching-badge" id="matchingBadge">
        <div class="spinner"></div>
        <span class="matching-badge-text">Snapping to roads...</span>
    </div>
    
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        <span id="toastText">Saved</span>
    </div>

    <script>
        // ============================================================
        // KALMAN FILTER
        // ============================================================
        class KalmanFilter {
            constructor(processNoise = 0.00001, measurementNoise = 0.0001) {
                this.Q = processNoise;
                this.R = measurementNoise;
                this.P = [[1, 0], [0, 1]];
                this.X = [0, 0];
                this.initialized = false;
            }
            
            filter(lat, lng) {
                if (!this.initialized) {
                    this.X = [lat, lng];
                    this.initialized = true;
                    return { lat, lng };
                }
                
                const P_pred = [
                    [this.P[0][0] + this.Q, this.P[0][1]],
                    [this.P[1][0], this.P[1][1] + this.Q]
                ];
                
                const K = [
                    [P_pred[0][0] / (P_pred[0][0] + this.R), 0],
                    [0, P_pred[1][1] / (P_pred[1][1] + this.R)]
                ];
                
                const y = [lat - this.X[0], lng - this.X[1]];
                
                this.X = [
                    this.X[0] + K[0][0] * y[0],
                    this.X[1] + K[1][1] * y[1]
                ];
                
                this.P = [
                    [(1 - K[0][0]) * P_pred[0][0], 0],
                    [0, (1 - K[1][1]) * P_pred[1][1]]
                ];
                
                return { lat: this.X[0], lng: this.X[1] };
            }
            
            reset() {
                this.P = [[1, 0], [0, 1]];
                this.X = [0, 0];
                this.initialized = false;
            }
        }
        
        // ============================================================
        // AUDIO KEEP-ALIVE
        // ============================================================
        let audioCtx = null;
        let audioSource = null;
        
        function startAudioKeepAlive() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = 4096;
                audioSource = audioCtx.createScriptProcessor(bufferSize, 1, 1);
                
                audioSource.onaudioprocess = (e) => {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < output.length; i++) {
                        output[i] = 0.0000001;
                    }
                };
                
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 0.001;
                
                audioSource.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            } catch (e) {
                console.warn('Audio keep-alive failed:', e);
            }
        }
        
        function stopAudioKeepAlive() {
            if (audioSource) { audioSource.disconnect(); audioSource = null; }
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }
        
        // ============================================================
        // GPS UTILS
        // ============================================================
        function haversineDistance(p1, p2) {
            const R = 6371000;
            const lat1 = p1.lat * Math.PI / 180;
            const lat2 = p2.lat * Math.PI / 180;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        
        function calculateBearing(p1, p2) {
            const lat1 = p1.lat * Math.PI / 180;
            const lat2 = p2.lat * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            bearing = (bearing + 360) % 360;
            
            return bearing;
        }
        
        // ============================================================
        // MAP MATCHING
        // ============================================================
        async function snapToRoad(points, profile = 'foot') {
            if (points.length < 2) return points;
            
            let simplified = points;
            if (points.length > 80) {
                simplified = simplifyTrack(points, 0.00003);
            }
            
            const coords = simplified.map(p => `${p.lng.toFixed(6)},${p.lat.toFixed(6)}`).join(';');
            const radiuses = simplified.map(() => 30).join(';');
            
            const url = `https://routing.openstreetmap.de/routed-foot/match/v1/foot/${coords}?overview=full&geometries=geojson&radiuses=${radiuses}&gaps=ignore`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.code === 'Ok' && data.matchings && data.matchings.length > 0) {
                    const geometry = data.matchings[0].geometry;
                    if (geometry && geometry.coordinates) {
                        return geometry.coordinates.map(c => ({
                            lat: c[1],
                            lng: c[0],
                            t: Date.now()
                        }));
                    }
                }
            } catch (e) {
                console.warn('Map matching failed:', e);
            }
            
            return points;
        }
        
        function simplifyTrack(points, tolerance = 0.0001) {
            if (points.length <= 2) return points;
            
            let maxDist = 0, maxIndex = 0;
            const start = points[0], end = points[points.length - 1];
            
            for (let i = 1; i < points.length - 1; i++) {
                const dist = perpendicularDistance(points[i], start, end);
                if (dist > maxDist) { maxDist = dist; maxIndex = i; }
            }
            
            if (maxDist > tolerance) {
                const left = simplifyTrack(points.slice(0, maxIndex + 1), tolerance);
                const right = simplifyTrack(points.slice(maxIndex), tolerance);
                return left.slice(0, -1).concat(right);
            }
            return [start, end];
        }
        
        function perpendicularDistance(point, lineStart, lineEnd) {
            const dx = lineEnd.lng - lineStart.lng;
            const dy = lineEnd.lat - lineStart.lat;
            const mag = Math.sqrt(dx * dx + dy * dy);
            if (mag === 0) return Math.sqrt((point.lng - lineStart.lng)**2 + (point.lat - lineStart.lat)**2);
            const u = ((point.lng - lineStart.lng) * dx + (point.lat - lineStart.lat) * dy) / (mag * mag);
            const x = lineStart.lng + u * dx;
            const y = lineStart.lat + u * dy;
            return Math.sqrt((point.lng - x)**2 + (point.lat - y)**2);
        }
        
        // ============================================================
        // LOCAL STORAGE
        // ============================================================
        function saveRouteToStorage() {
            try {
                localStorage.setItem('traila_route', JSON.stringify(route));
                localStorage.setItem('traila_start', startTime);
            } catch (e) {}
        }
        
        function loadRouteFromStorage() {
            try {
                const saved = localStorage.getItem('traila_route');
                if (saved) return JSON.parse(saved);
            } catch (e) {}
            return null;
        }
        
        function clearRouteStorage() {
            localStorage.removeItem('traila_route');
            localStorage.removeItem('traila_start');
        }
        
        // ============================================================
        // MAIN APP STATE
        // ============================================================
        let mainMap, cardMap;
        let polyline, glowLine;
        let cardPolyline, cardGlow;
        let watchId;
        let route = [];
        let matchedRoute = null;
        let startTime, endTime, pausedDuration = 0, pauseStart = null;
        let isTracking = false;
        let isPaused = false;
        let timerInterval;
        let lastKnownPosition = null;
        let locationMarker = null;
        let kalmanLat = new KalmanFilter(0.00001, 0.0001);
        let kalmanLng = new KalmanFilter(0.00001, 0.0001);
        let lastAcceptedPoint = null;
        let activityProfile = 'foot';
        let currentHeading = 0;
        
        // НАДЕЖНЫЕ ТЁМНЫЕ ТАЙЛЫ (CartoDB Dark), работают через Cloudflare в РФ
        const themeConfig = {
            tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            subdomains: ['a', 'b', 'c', 'd'],
            lineColor: '#c4f04d',
            glowColor: '#c4f04d',
            markerColor: '#c4f04d'
        };
        
        // ============================================================
        // GPS QUALITY INDICATOR
        // ============================================================
        function updateGPSIndicator(accuracy) {
            const indicator = document.getElementById('gpsIndicator');
            const text = document.getElementById('gpsText');
            
            indicator.classList.add('active');

                text.textContent = `${Math.round(accuracy)}m`;
            } else if (accuracy <= 25) {
                indicator.classList.add('medium');
                text.textContent = `${Math.round(accuracy)}m`;
            } else {
                indicator.classList.add('bad');
                text.textContent = `${Math.round(accuracy)}m`;
            }
        }
        
        // ============================================================
        // CURRENT LOCATION MARKER
        // ============================================================
        function createLocationMarkerHTML(heading = 0) {
            return `
                <div style="position: relative; width: 32px; height: 32px;">
                    <div style="
                        position: absolute;
                        top: 50%;
                        left: 50%;

                    <div style="
                        position: absolute;
                        top: 50%;
                        left: 50%;

                        width: 0;
                        height: 0;
                        border-left: 6px solid transparent;
                        border-right: 6px solid transparent;
                        border-bottom: 12px solid ${themeConfig.markerColor};
                        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
                        transition: transform 0.3s ease;
                    "></div>
                    <div style="
                        position: absolute;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);

                        height: 12px;

                    @keyframes markerPulse {

                    }

        }
        
        function updateCurrentLocationMarker(lat, lng, heading = 0) {
            currentHeading = heading;
            
            if (!locationMarker) {
                const markerIcon = L.divIcon({
                    className: '',
                    html: createLocationMarkerHTML(heading),
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                });
                
                locationMarker = L.marker([lat, lng], { icon: markerIcon, zIndexOffset: 1000 }).addTo(mainMap);
            } else {
                locationMarker.setLatLng([lat, lng]);
                locationMarker.setIcon(L.divIcon({
                    className: '',
                    html: createLocationMarkerHTML(heading),
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                }));
            }
        }
        
        function removeCurrentLocationMarker() {
            if (locationMarker) {
                mainMap.removeLayer(locationMarker);
                locationMarker = null;
            }
        }
        
        // ============================================================
        // MAP INIT
        // ============================================================
        function initMainMap() {
            mainMap = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([55.7558, 37.6173], 15);
            
            // Добавлены subdomains и crossOrigin для стабильности и скриншотов
            L.tileLayer(themeConfig.tileUrl, { 
                maxZoom: 19,
                subdomains: themeConfig.subdomains,
                crossOrigin: 'anonymous'
            }).addTo(mainMap);
            
            glowLine = L.polyline([], {
                color: themeConfig.glowColor,
                weight: 14,
                opacity: 0.25,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
            
            polyline = L.polyline([], {
                color: themeConfig.lineColor,
                weight: 5,
                opacity: 0.95,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
            
            const saved = loadRouteFromStorage();
            if (saved && saved.length > 0) {
                route = saved;
                route.forEach(p => {
                    polyline.addLatLng([p.lat, p.lng]);
                    glowLine.addLatLng([p.lat, p.lng]);
                });
                updateLiveStats();
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        lastKnownPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        mainMap.setView([lastKnownPosition.lat, lastKnownPosition.lng], 16);
                        updateCurrentLocationMarker(lastKnownPosition.lat, lastKnownPosition.lng, 0);
                    },
                    () => {
                        console.log('Geolocation failed, using default location');
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        }
        
        function recenterMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        lastKnownPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        mainMap.setView([lastKnownPosition.lat, lastKnownPosition.lng], 17, { animate: true });
                        updateCurrentLocationMarker(lastKnownPosition.lat, lastKnownPosition.lng, currentHeading);
                    },
                    () => {
                        if (lastKnownPosition) {
                            mainMap.panTo([lastKnownPosition.lat, lastKnownPosition.lng], { animate: true });
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }
        
        // ============================================================
        // TRACKING
        // ============================================================
        function startTracking() {
            if (!navigator.geolocation) {
                showToast('Geolocation not supported');
                return;
            }
            
            startAudioKeepAlive();
            
            isTracking = true;
            isPaused = false;
            route = [];
            matchedRoute = null;
            startTime = Date.now();
            pausedDuration = 0;
            pauseStart = null;
            
            kalmanLat.reset();
            kalmanLng.reset();
            lastAcceptedPoint = null;
            
            document.getElementById('btnRowIdle').style.display = 'none';
            document.getElementById('btnRowActive').style.display = 'flex';
            document.getElementById('recBadge').classList.add('active');
            
            timerInterval = setInterval(updateLiveStats, 1000);
            
            watchId = navigator.geolocation.watchPosition(
                handleGPSUpdate,
                (err) => {
                    console.warn('GPS error:', err);
                    setTimeout(() => {
                        if (isTracking) {
                            navigator.geolocation.getCurrentPosition(
                                handleGPSUpdate,
                                () => {},
                                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                            );
                        }
                    }, 2000);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
            );
            
            startFallbackPolling();
        }
        
        let fallbackInterval = null;
        
        function startFallbackPolling() {
            if (fallbackInterval) clearInterval(fallbackInterval);
            fallbackInterval = setInterval(() => {
                if (!isTracking) {
                    clearInterval(fallbackInterval);
                    fallbackInterval = null;
                    return;
                }
                
                const lastPointTime = route.length > 0 ? route[route.length - 1].t : startTime;
                const timeSinceLastPoint = Date.now() - lastPointTime;
                
                if (timeSinceLastPoint > 8000) {
                    navigator.geolocation.getCurrentPosition(
                        handleGPSUpdate,
                        () => {},
                        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                    );
                }
            }, 3000);
        }
        
        function handleGPSUpdate(pos) {
            if (!mainMap) return; // Защита от вызова до инициализации карты
            
            const { latitude, longitude, accuracy, heading } = pos.coords;
            
            lastKnownPosition = { lat: latitude, lng: longitude };
            updateGPSIndicator(accuracy);
            
            let direction = heading;
            if (direction === null || direction === undefined || isNaN(direction)) {
                if (route.length >= 2) {
                    direction = calculateBearing(route[route.length - 2], route[route.length - 1]);
                } else {
                    direction = currentHeading;
                }
            }
            
            updateCurrentLocationMarker(latitude, longitude, direction);
            
            if (isPaused) {
                mainMap.panTo([latitude, longitude], { animate: true, duration: 0.5 });
                return;
            }
            
            if (accuracy > 20) return;
            
            const filtered = {
                lat: kalmanLat.filter(latitude, longitude).lat,
                lng: kalmanLng.filter(longitude, latitude).lng,
                t: Date.now(),
                accuracy: accuracy
            };
            
            if (lastAcceptedPoint) {
                const dist = haversineDistance(lastAcceptedPoint, filtered);
                const timeDiff = (filtered.t - lastAcceptedPoint.t) / 1000;
                
                if (timeDiff > 0) {
                    const speed = dist / timeDiff;
                    if (speed > 15) {
                        console.warn('GPS jump detected, ignoring point');
                        return;
                    }
                }
                
                if (dist < 2) return;
            }
            
            lastAcceptedPoint = filtered;
            route.push(filtered);
            
            polyline.addLatLng([filtered.lat, filtered.lng]);
            glowLine.addLatLng([filtered.lat, filtered.lng]);
            
            mainMap.panTo([filtered.lat, filtered.lng], { animate: true, duration: 0.5 });
            
            saveRouteToStorage();
            updateLiveStats();
        }
        
        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('pauseIcon');
            const label = document.getElementById('pauseLabel');
            
            if (isPaused) {
                pauseStart = Date.now();
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                label.textContent = 'Resume';
                document.getElementById('recBadge').classList.remove('active');
            } else {
                if (pauseStart) {
                    pausedDuration += Date.now() - pauseStart;
                    pauseStart = null;
                }
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
                label.textContent = 'Pause';
                document.getElementById('recBadge').classList.add('active');
            }
        }
        
        async function finishTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (fallbackInterval) {
                clearInterval(fallbackInterval);
                fallbackInterval = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            stopAudioKeepAlive();
            removeCurrentLocationMarker();
            
            isTracking = false;
            isPaused = false;
            endTime = Date.now();
            
            document.getElementById('btnRowIdle').style.display = 'flex';
            document.getElementById('btnRowActive').style.display = 'none';
            document.getElementById('recBadge').classList.remove('active');
            document.getElementById('gpsIndicator').classList.remove('active');
            
            if (route.length >= 2) {
                document.getElementById('matchingBadge').classList.add('active');
                try {
                    matchedRoute = await snapToRoad(route, activityProfile);
                } catch (e) {
                    matchedRoute = route;
                }
                document.getElementById('matchingBadge').classList.remove('active');
            } else {
                matchedRoute = route;
            }
            
            clearRouteStorage();
            showFinishScreen();
        }
        
        function discardAndBack() {
            document.getElementById('finishScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');
            route = [];
            matchedRoute = null;
            polyline.setLatLngs([]);
            glowLine.setLatLngs([]);
            updateLiveStats();
            if (cardMap) {
                cardMap.remove();
                cardMap = null;
            }
            clearRouteStorage();
        }
        
        function getElapsedTime() {
            if (!startTime) return 0;
            let elapsed = Math.floor(((endTime || Date.now()) - startTime) / 1000);
            if (isPaused && pauseStart) {
                elapsed -= Math.floor((Date.now() - pauseStart) / 1000);
            }
            elapsed -= Math.floor(pausedDuration / 1000);
            return Math.max(0, elapsed);
        }
        
        function calcDistance(pts) {
            if (!pts || pts.length < 2) return 0;
            let total = 0;
            for (let i = 1; i < pts.length; i++) {
                total += haversineDistance(pts[i-1], pts[i]);
            }
            return total / 1000;
        }
        
        function updateLiveStats() {
            const d = calcDistance(route);
            document.getElementById('distance').textContent = d.toFixed(2);
            
            const elapsed = getElapsedTime();
            document.getElementById('time').textContent = fmtTime(elapsed);
            
            if (d > 0.02) {
                const pace = elapsed / d;
                document.getElementById('pace').textContent = fmtPace(pace);
            }
        }
        
        async function showFinishScreen() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            
            const displayRoute = matchedRoute || route;
            const d = calcDistance(displayRoute);
            const elapsed = getElapsedTime();
            
            document.getElementById('cardDistance').textContent = d.toFixed(2);
            document.getElementById('cardTime').textContent = fmtTime(elapsed);
            document.getElementById('cardPace').textContent = d > 0.02 ? fmtPace(elapsed / d) : '—';
            
            const now = new Date(endTime || Date.now());
            const opts = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('cardDate').textContent = now.toLocaleDateString('ru-RU', opts).toUpperCase();
            
            setTimeout(() => initCardMap(), 300);
        }
        
        function initCardMap() {
            if (cardMap) cardMap.remove();
            
            cardMap = L.map('cardMap', {
                zoomControl: false,
                attributionControl: false,
                dragging: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                touchZoom: false,
                boxZoom: false,
                keyboard: false,
                tap: false
            });
            
            L.tileLayer(themeConfig.tileUrl, { 
                maxZoom: 19,
                subdomains: themeConfig.subdomains,
                crossOrigin: 'anonymous'
            }).addTo(cardMap);
            
            const displayRoute = matchedRoute || route;
            
            if (displayRoute.length > 0) {
                const distance = calcDistance(displayRoute);
                const simplifiedRoute = distance > 3 ? simplifyTrack(displayRoute, 0.00005) : displayRoute;
                
                cardGlow = L.polyline([], {
                    color: themeConfig.glowColor,
                    weight: distance > 5 ? 6 : 10,
                    opacity: distance > 5 ? 0.4 : 0.3,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                cardPolyline = L.polyline([], {
                    color: themeConfig.lineColor,
                    weight: distance > 5 ? 3 : 4,
                    opacity: 1,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                simplifiedRoute.forEach(p => {
                    cardPolyline.addLatLng([p.lat, p.lng]);
                    cardGlow.addLatLng([p.lat, p.lng]);
                });
                
                const bounds = cardPolyline.getBounds();
                if (bounds.isValid()) {
                    cardMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 18 });
                }
                
                setTimeout(() => {
                    cardMap.invalidateSize();
                }, 100);
            }
        }
        
        // ============================================================
        // SCREENSHOT RENDERING
        // ============================================================
        async function captureCardAsImage() {
            const card = document.getElementById('card');
            
            if (cardMap) {
                cardMap.invalidateSize();
                await new Promise(resolve => setTimeout(resolve, 800));
            }
            
            try {
                const canvas = await html2canvas(card, {
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: '#0f0f14', // Гарантирует отсутствие прозрачности/белого фона
                    scale: 2,
                    logging: false,
                    ignoreElements: (element) => element.id === 'cardLoading'
                });
                return canvas;
            } catch (e) {
                console.error("html2canvas failed:", e);
                throw e;
            }
        }
        
        async function saveCard() {
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            try {
                const canvas = await captureCardAsImage();
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `traila-${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('Saved to downloads');
                }, 'image/png');
            } catch (e) {
                showToast('Export failed');
                console.error(e);
            } finally {
                loading.classList.remove('active');
            }
        }
        
        async function shareCard() {
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            try {
                const canvas = await captureCardAsImage();
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'traila.png', { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({ files: [file], title: 'Traila Activity' });
                            showToast('Shared');
                        } catch (e) {
                            if (e.name !== 'AbortError') fallbackShare(canvas);
                        }
                    } else {
                        fallbackShare(canvas);
                    }
                    loading.classList.remove('active');
                }, 'image/png');
            } catch (e) {
                showToast('Share failed');
                loading.classList.remove('active');
            }
        }
        
        function fallbackShare(canvas) {
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `traila-${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('Image saved — share manually');
            });
        }
        
        function fmtTime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        
        function fmtPace(secPerKm) {
            const m = Math.floor(secPerKm / 60);
            const s = Math.floor(secPerKm % 60);
            return `${m}:${String(s).padStart(2,'0')}`;
        }
        
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
        
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isTracking) {
                navigator.geolocation.getCurrentPosition(
                    handleGPSUpdate,
                    () => {},
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        });
        
        window.onload = initMainMap;
    </script>
</body>
</html>
