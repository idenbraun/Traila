<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Traila</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-2: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
            --text-faint: rgba(255, 255, 255, 0.35);
            --accent: #c4f04d;
            --accent-2: #a8e03a;
            --danger: #ff4757;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            letter-spacing: -0.02em;
            position: relative;
        }
        
        /* ============ MAP ============ */
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }
        
        /* ============ TRACKING SCREEN ============ */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .screen > * { pointer-events: auto; }
        
        .screen.hidden {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none !important;
        }
        
        .screen.hidden > * { pointer-events: none !important; }
        
        /* Top bar */
        .top-bar {
            padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(10, 10, 11, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 100px;
        }
        
        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }
        
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(255, 71, 87, 0.15);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 100px;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.3s ease;
        }
        
        .rec-badge.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .rec-dot {
            width: 6px;
            height: 6px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(255, 71, 87, 0); }
        }
        
        .rec-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        
        /* Stats bento */
        .stats-bento {
            padding: 0 16px;
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 8px;
        }
        
        .stat-tile {
            background: rgba(10, 10, 11, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .stat-tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        
        .stat-tile.primary {
            grid-column: 1;
            grid-row: span 2;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-faint);
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 36px;
            line-height: 1;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }
        
        .stat-tile.primary .stat-value {
            font-size: 56px;
        }
        
        .stat-unit {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            margin-left: 4px;
            letter-spacing: 0;
        }
        
        .stat-tile.primary .stat-unit {
            font-size: 18px;
        }
        
        .stat-tile.small .stat-value {
            font-size: 24px;
        }
        
        /* Bottom controls */
        .bottom-bar {
            padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            border: none;
            border-radius: 22px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-start {
            background: var(--accent);
            color: #0a0a0b;
            box-shadow: 0 10px 40px -10px var(--accent), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .btn-stop {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 10px 40px -10px var(--danger);
        }
        
        .btn-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon svg { width: 100%; height: 100%; }
        
        /* ============ FINISH SCREEN ============ */
        #finishScreen {
            background: var(--bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: calc(env(safe-area-inset-top, 0px) + 16px) 0 calc(env(safe-area-inset-bottom, 0px) + 20px);
        }
        
        .finish-header {
            padding: 8px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .finish-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .close-btn:active { background: var(--border-strong); }
        
        /* ============ CARD (the pinterest magic) ============ */
        .card-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            border-radius: 28px;
            overflow: hidden;
            background: #0a0a0b;
            box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        /* Theme: NEON */
        .card.theme-neon {
            background: linear-gradient(160deg, #0f0f14 0%, #1a0f24 50%, #0f0f14 100%);
        }
        
        .card.theme-neon::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(196, 240, 77, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.2) 0%, transparent 40%);
            pointer-events: none;
        }
        
        /* Theme: SUNRISE */
        .card.theme-sunrise {
            background: linear-gradient(160deg, #1a0f0a 0%, #2d1810 50%, #0f0a0a 100%);
        }
        
        .card.theme-sunrise::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 20%, rgba(255, 140, 66, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 71, 87, 0.15) 0%, transparent 50%);
        }
        
        /* Theme: OCEAN */
        .card.theme-ocean {
            background: linear-gradient(160deg, #0a1420 0%, #0f2030 50%, #0a1420 100%);
        }
        
        .card.theme-ocean::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(56, 189, 248, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(196, 240, 77, 0.1) 0%, transparent 50%);
        }
        
        /* Theme: MONO */
        .card.theme-mono {
            background: linear-gradient(160deg, #f5f5f0 0%, #e8e8e3 100%);
            color: #0a0a0b;
        }
        
        .card.theme-mono::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 30%, rgba(0,0,0,0.04) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(0,0,0,0.06) 0%, transparent 50%);
        }
        
        /* Card inner layout */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 28px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }
        
        .card.theme-mono .card-inner { color: #0a0a0b; }
        
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .card-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .card-brand-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .card-date {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            letter-spacing: 0.05em;
            text-align: right;
        }
        
        /* Map area inside card */
        .card-map {
            flex: 1;
            margin: 20px 0;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .card.theme-mono .card-map {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.08);
        }
        
        #cardMap {
            width: 100%;
            height: 100%;
        }
        
        .card-map .leaflet-control-attribution { display: none !important; }
        
        /* Stats row inside card */
        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .card.theme-mono .card-stats {
            border-top-color: rgba(0,0,0,0.1);
        }
        
        .card-stat-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            opacity: 0.5;
            margin-bottom: 6px;
        }
        
        .card-stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 26px;
            letter-spacing: -0.03em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        
        .card-stat-unit {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            margin-left: 2px;
        }
        
        /* Theme selector */
        .themes {
            padding: 0 20px;
            margin-bottom: 16px;
        }
        
        .themes-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-faint);
            margin-bottom: 12px;
        }
        
        .themes-row {
            display: flex;
            gap: 10px;
        }
        
        .theme-chip {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .theme-chip.active {
            background: var(--surface-2);
            border-color: var(--accent);
        }
        
        .theme-chip-name {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        
        .theme-chip-preview {
            width: 100%;
            height: 24px;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        
        .chip-neon { background: linear-gradient(135deg, #0f0f14, #1a0f24); }
        .chip-sunrise { background: linear-gradient(135deg, #1a0f0a, #2d1810); }
        .chip-ocean { background: linear-gradient(135deg, #0a1420, #0f2030); }
        .chip-mono { background: linear-gradient(135deg, #f5f5f0, #e8e8e3); }
        
        /* Action buttons */
        .actions {
            padding: 0 20px;
            display: flex;
            gap: 10px;
        }
        
        .btn-action {
            flex: 1;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s;
        }
        
        .btn-action:active { transform: scale(0.98); }
        
        .btn-save {
            background: var(--accent);
            color: #0a0a0b;
            flex: 1.5;
        }
        
        .btn-share {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 22px;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-strong);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast-icon {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }
        
        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 28px;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- ============ TRACKING SCREEN ============ -->
    <div class="screen" id="trackingScreen">
        <div id="map"></div>
        
        <div class="top-bar">
            <div class="logo">
                <div class="logo-dot"></div>
                <span>TRAILA</span>
            </div>
            <div class="rec-badge" id="recBadge">
                <div class="rec-dot"></div>
                <span class="rec-text">REC</span>
            </div>
        </div>
        
        <div class="stats-bento">
            <div class="stat-tile primary">
                <div class="stat-label">Distance</div>
                <div class="stat-value">
                    <span id="distance">0.00</span><span class="stat-unit">km</span>
                </div>
            </div>
            <div class="stat-tile small">
                <div class="stat-label">Time</div>
                <div class="stat-value"><span id="time">00:00</span></div>
            </div>
            <div class="stat-tile small">
                <div class="stat-label">Pace</div>
                <div class="stat-value">
                    <span id="pace">—</span><span class="stat-unit">/km</span>
                </div>
            </div>
        </div>
        
        <div class="bottom-bar">
            <button class="btn btn-start" id="startBtn" onclick="startTracking()">
                <span class="btn-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </span>
                <span>Start Activity</span>
            </button>
            <button class="btn btn-stop" id="stopBtn" onclick="finishTracking()" style="display:none">
                <span class="btn-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                </span>
                <span>Finish</span>
            </button>
        </div>
    </div>
    
    <!-- ============ FINISH SCREEN ============ -->
    <div class="screen hidden" id="finishScreen">
        <div class="finish-header">
            <div class="finish-title">Activity Complete</div>
            <button class="close-btn" onclick="discardAndBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="card-wrapper">
            <div class="card theme-neon" id="card">
                <div class="card-inner">
                    <div class="card-top">
                        <div class="card-brand">
                            <span class="card-brand-dot"></span>
                            <span>Traila</span>
                        </div>
                        <div class="card-date" id="cardDate">—</div>
                    </div>
                    
                    <div class="card-map">
                        <div id="cardMap"></div>
                        <div class="loading-overlay" id="cardLoading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    
                    <div class="card-stats">
                        <div>
                            <div class="card-stat-label">Distance</div>
                            <div class="card-stat-value">
                                <span id="cardDistance">0.00</span><span class="card-stat-unit">km</span>
                            </div>
                        </div>
                        <div>
                            <div class="card-stat-label">Time</div>
                            <div class="card-stat-value"><span id="cardTime">00:00</span></div>
                        </div>
                        <div>
                            <div class="card-stat-label">Pace</div>
                            <div class="card-stat-value">
                                <span id="cardPace">—</span><span class="card-stat-unit">/km</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="themes">
            <div class="themes-label">Style</div>
            <div class="themes-row">
                <div class="theme-chip active" data-theme="neon" onclick="setTheme('neon')">
                    <div class="theme-chip-preview chip-neon"></div>
                    <div class="theme-chip-name">Neon</div>
                </div>
                <div class="theme-chip" data-theme="sunrise" onclick="setTheme('sunrise')">
                    <div class="theme-chip-preview chip-sunrise"></div>
                    <div class="theme-chip-name">Sunrise</div>
                </div>
                <div class="theme-chip" data-theme="ocean" onclick="setTheme('ocean')">
                    <div class="theme-chip-preview chip-ocean"></div>
                    <div class="theme-chip-name">Ocean</div>
                </div>
                <div class="theme-chip" data-theme="mono" onclick="setTheme('mono')">
                    <div class="theme-chip-preview chip-mono"></div>
                    <div class="theme-chip-name">Mono</div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-action btn-save" onclick="saveCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Save Image
            </button>
            <button class="btn-action btn-share" onclick="shareCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                Share
            </button>
        </div>
    </div>
    
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        <span id="toastText">Saved</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ============ STATE ============
        let mainMap, cardMap;
        let polyline, glowLine;
        let cardPolyline, cardGlow;
        let watchId;
        let route = [];
        let startTime, endTime;
        let isTracking = false;
        let currentTheme = 'neon';
        
        // ============ THEME CONFIGS ============
        const themeConfigs = {
            neon: {
                tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                lineColor: '#c4f04d',
                glowColor: '#c4f04d',
                markerColor: '#c4f04d'
            },
            sunrise: {
                tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                lineColor: '#ff8c42',
                glowColor: '#ff4757',
                markerColor: '#ff8c42'
            },
            ocean: {
                tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
                lineColor: '#38bdf8',
                glowColor: '#38bdf8',
                markerColor: '#38bdf8'
            },
            mono: {
                tileUrl: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
                lineColor: '#0a0a0b',
                glowColor: '#0a0a0b',
                markerColor: '#0a0a0b'
            }
        };
        
        // ============ INIT MAIN MAP ============
        function initMainMap() {
            mainMap = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([55.7558, 37.6173], 15);
            
            L.tileLayer(themeConfigs.neon.tileUrl, { maxZoom: 19 }).addTo(mainMap);
            
            glowLine = L.polyline([], {
                color: themeConfigs.neon.glowColor,
                weight: 14,
                opacity: 0.25,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
            
            polyline = L.polyline([], {
                color: themeConfigs.neon.lineColor,
                weight: 5,
                opacity: 0.95,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
        }
        
        // ============ TRACKING ============
        function startTracking() {
            if (!navigator.geolocation) {
                showToast('Geolocation not supported');
                return;
            }
            
            isTracking = true;
            route = [];
            startTime = new Date();
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'flex';
            document.getElementById('recBadge').classList.add('active');
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const p = { lat: pos.coords.latitude, lng: pos.coords.longitude, t: Date.now() };
                    route.push(p);
                    polyline.addLatLng([p.lat, p.lng]);
                    glowLine.addLatLng([p.lat, p.lng]);
                    mainMap.panTo([p.lat, p.lng], { animate: true, duration: 0.5 });
                    updateLiveStats();
                },
                (err) => showToast('GPS error: ' + err.message),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }
        
        function finishTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            isTracking = false;
            endTime = new Date();
            
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('recBadge').classList.remove('active');
            
            showFinishScreen();
        }
        
        function discardAndBack() {
            document.getElementById('finishScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');
            route = [];
            polyline.setLatLngs([]);
            glowLine.setLatLngs([]);
            updateLiveStats();
            if (cardMap) {
                cardMap.remove();
                cardMap = null;
            }
        }
        
        // ============ LIVE STATS ============
        function updateLiveStats() {
            const d = calcDistance(route);
            document.getElementById('distance').textContent = d.toFixed(2);
            
            if (startTime) {
                const s = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('time').textContent = fmtTime(s);
                
                if (d > 0.02) {
                    const pace = s / d;
                    document.getElementById('pace').textContent = fmtPace(pace);
                }
            }
        }
        
        // ============ FINISH SCREEN ============
        function showFinishScreen() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            
            // Fill stats
            const d = calcDistance(route);
            const elapsed = Math.floor(((endTime || Date.now()) - startTime) / 1000);
            
            document.getElementById('cardDistance').textContent = d.toFixed(2);
            document.getElementById('cardTime').textContent = fmtTime(elapsed);
            document.getElementById('cardPace').textContent = d > 0.02 ? fmtPace(elapsed / d) : '—';
            
            // Date
            const now = endTime || new Date();
            const opts = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('cardDate').textContent = now.toLocaleDateString('en-US', opts).toUpperCase();
            
            // Init card map
            setTimeout(() => initCardMap(), 100);
        }
        
        function initCardMap() {
            if (cardMap) cardMap.remove();
            
            const cfg = themeConfigs[currentTheme];
            
            cardMap = L.map('cardMap', {
                zoomControl: false,
                attributionControl: false,
                dragging: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                touchZoom: false,
                boxZoom: false,
                keyboard: false
            });
            
            L.tileLayer(cfg.tileUrl, { maxZoom: 19 }).addTo(cardMap);
            
            if (route.length > 0) {
                cardGlow = L.polyline([], {
                    color: cfg.glowColor,
                    weight: 10,
                    opacity: 0.3,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                cardPolyline = L.polyline([], {
                    color: cfg.lineColor,
                    weight: 4,
                    opacity: 1,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                route.forEach(p => {
                    cardPolyline.addLatLng([p.lat, p.lng]);
                    cardGlow.addLatLng([p.lat, p.lng]);
                });
                
                // Fit bounds with padding
                const bounds = cardPolyline.getBounds();
                cardMap.fitBounds(bounds, { padding: [20, 20] });
                
                // Start marker
                const startIcon = L.divIcon({
                    className: '',
                    html: `<div style="width:10px;height:10px;border-radius:50%;background:${cfg.markerColor};border:2px solid #fff;box-shadow:0 0 8px ${cfg.markerColor}"></div>`,
                    iconSize: [10, 10]
                });
                L.marker([route[0].lat, route[0].lng], { icon: startIcon }).addTo(cardMap);
                
                // End marker
                if (route.length > 1) {
                    const last = route[route.length - 1];
                    const endIcon = L.divIcon({
                        className: '',
                        html: `<div style="width:10px;height:10px;border-radius:50%;background:${cfg.markerColor};border:2px solid #fff;box-shadow:0 0 8px ${cfg.markerColor}"></div>`,
                        iconSize: [10, 10]
                    });
                    L.marker([last.lat, last.lng], { icon: endIcon }).addTo(cardMap);
                }
            }
        }
        
        function setTheme(theme) {
            currentTheme = theme;
            document.querySelectorAll('.theme-chip').forEach(c => c.classList.remove('active'));
            document.querySelector(`.theme-chip[data-theme="${theme}"]`).classList.add('active');
            
            const card = document.getElementById('card');
            card.className = 'card theme-' + theme;
            
            initCardMap();
        }
        
        // ============ SAVE / SHARE ============
        async function saveCard() {
            const card = document.getElementById('card');
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            // Wait for map tiles
            await new Promise(r => setTimeout(r, 1200));
            
            try {
                const canvas = await html2canvas(card, {
                    backgroundColor: null,
                    scale: 2,
                    useCORS: true,
                    logging: false
                });
                
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `traila-${Date.now()}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Saved to downloads');
                }, 'image/png');
            } catch (e) {
                showToast('Export failed');
                console.error(e);
            } finally {
                loading.classList.remove('active');
            }
        }
        
        async function shareCard() {
            const card = document.getElementById('card');
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            await new Promise(r => setTimeout(r, 1200));
            
            try {
                const canvas = await html2canvas(card, {
                    backgroundColor: null,
                    scale: 2,
                    useCORS: true,
                    logging: false
                });
                
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'traila.png', { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Traila Activity',
                                text: 'Check out my route!'
                            });
                            showToast('Shared');
                        } catch (e) {
                            if (e.name !== 'AbortError') {
                                fallbackShare();
                            }
                        }
                    } else {
                        fallbackShare();
                    }
                    loading.classList.remove('active');
                }, 'image/png');
            } catch (e) {
                showToast('Share failed');
                loading.classList.remove('active');
            }
        }
        
        function fallbackShare() {
            // Fallback: download
            const card = document.getElementById('card');
            html2canvas(card, { backgroundColor: null, scale: 2, useCORS: true }).then(canvas => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `traila-${Date.now()}.png`;
                    a.click();
                    showToast('Image saved — share manually');
                });
            });
        }
        
        // ============ UTILS ============
        function calcDistance(pts) {
            if (pts.length < 2) return 0;
            let total = 0;
            const R = 6371;
            for (let i = 1; i < pts.length; i++) {
                const lat1 = pts[i-1].lat * Math.PI / 180;
                const lat2 = pts[i].lat * Math.PI / 180;
                const dLat = (pts[i].lat - pts[i-1].lat) * Math.PI / 180;
                const dLon = (pts[i].lng - pts[i-1].lng) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
                total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            return total;
        }
        
        function fmtTime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        
        function fmtPace(secPerKm) {
            const m = Math.floor(secPerKm / 60);
            const s = Math.floor(secPerKm % 60);
            return `${m}:${String(s).padStart(2,'0')}`;
        }
        
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
        
        // ============ BOOT ============
        window.onload = initMainMap;
    </script>
</body>
</html>
