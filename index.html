<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Traila</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-2: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
            --text-faint: rgba(255, 255, 255, 0.35);
            --accent: #c4f04d;
            --danger: #ff4757;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            letter-spacing: -0.02em;
            position: relative;
        }
        
        /* ============ MAP ============ */
        #map {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        
        #map, #map * {
            pointer-events: auto !important;
        }
        
        .leaflet-control-attribution { display: none !important; }
        .leaflet-control-zoom { display: none !important; }
        
        /* ============ SCREENS ============ */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        
        .screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 5;
        }
        
        /* ============ TRACKING SCREEN ============ */
        #trackingScreen {
            justify-content: space-between;
        }
        
        /* Top bar */
        .top-bar {
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 20;
            pointer-events: none;
        }
        
        .top-bar > * {
            pointer-events: auto;
        }
        
        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.04em;
            color: var(--text);
            text-shadow: 0 2px 16px rgba(0,0,0,0.8), 0 0 4px rgba(0,0,0,0.5);
        }
        
        .rec-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(-8px);
            transition: all 0.3s ease;
        }
        
        .rec-badge.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 12px var(--danger);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--danger); }
            50% { opacity: 0.6; box-shadow: 0 0 20px var(--danger); }
        }
        
        .rec-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--danger);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 16px rgba(0,0,0,0.8), 0 0 4px rgba(0,0,0,0.5);
        }
        
        /* Bottom panel */
        .bottom-panel {
            position: relative;
            z-index: 20;
            padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Stats */
        .stats-bento {
            display: flex;
            gap: 8px;
        }
        
        .stat-tile {
            background: transparent;
            border-radius: 20px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            flex: 1;
        }
        
        .stat-tile.primary {
            flex: 1.2;
            padding: 20px;
        }
        
        .stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.6);
        }
        
        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 32px;
            line-height: 1;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            color: var(--text);
            text-shadow: 0 2px 12px rgba(0,0,0,0.7);
        }
        
        .stat-tile.primary .stat-value {
            font-size: 48px;
        }
        
        .stat-unit {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
            letter-spacing: 0;
        }
        
        .stat-tile.primary .stat-unit {
            font-size: 16px;
        }
        
        /* Button row */
        .btn-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        
        .btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            border: none;
            border-radius: 22px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            flex: 1;
            background: var(--accent);
            color: #0a0a0b;
            box-shadow: 0 10px 40px -10px var(--accent), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        .btn-icon-only {
            width: 62px;
            flex: none;
            padding: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text);
        }
        
        .btn-icon-only:active {
            background: rgba(255, 255, 255, 0.18);
        }
        
        .btn-icon-only svg {
            width: 22px;
            height: 22px;
        }
        
        .btn-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-icon svg { width: 100%; height: 100%; }
        
        /* ============ FINISH SCREEN ============ */
        #finishScreen {
            background: var(--bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: calc(env(safe-area-inset-top, 0px) + 16px) 0 calc(env(safe-area-inset-bottom, 0px) + 20px);
        }
        
        .finish-header {
            padding: 8px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .finish-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        
        .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .close-btn:active { background: var(--border-strong); }
        
        /* ============ CARD ============ */
        .card-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        
        .card {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient(160deg, #0f0f14 0%, #1a0f24 50%, #0f0f14 100%);
            box-shadow: 0 30px 80px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(196, 240, 77, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.2) 0%, transparent 40%);
            pointer-events: none;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 28px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }
        
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .card-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .card-brand-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .card-date {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            letter-spacing: 0.05em;
            text-align: right;
        }
        
        .card-map {
            flex: 1;
            margin: 20px 0;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            min-height: 200px;
        }
        
        #cardMap {
            width: 100%;
            height: 100%;
        }
        
        .card-map .leaflet-control-attribution { display: none !important; }
        
        .card-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .card-stat-label {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            opacity: 0.5;
            margin-bottom: 6px;
        }
        
        .card-stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 24px;
            letter-spacing: -0.03em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        
        .card-stat-unit {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.5;
            margin-left: 2px;
        }
        
        /* Action buttons */
        .actions {
            padding: 0 20px;
            display: flex;
            gap: 10px;
        }
        
        .btn-action {
            flex: 1;
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.15s;
        }
        
        .btn-action:active { transform: scale(0.98); }
        
        .btn-save {
            background: var(--accent);
            color: #0a0a0b;
            flex: 1.5;
        }
        
        .btn-share {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 22px;
            background: rgba(10, 10, 11, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-strong);
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast-icon {
            width: 16px;
            height: 16px;
            color: var(--accent);
        }
        
        /* Loading */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 11, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border-radius: 28px;
        }
        
        .loading-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- TRACKING SCREEN -->
    <div class="screen" id="trackingScreen">
        <div id="map"></div>
        
        <div class="top-bar">
            <div class="logo-text">TRAILA</div>
            <div class="rec-badge" id="recBadge">
                <div class="rec-dot"></div>
                <span class="rec-text">REC</span>
            </div>
        </div>
        
        <div class="bottom-panel">
            <div class="stats-bento">
                <div class="stat-tile primary">
                    <div class="stat-label">Distance</div>
                    <div class="stat-value">
                        <span id="distance">0.00</span><span class="stat-unit">km</span>
                    </div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">Time</div>
                    <div class="stat-value"><span id="time">00:00</span></div>
                </div>
                <div class="stat-tile">
                    <div class="stat-label">Pace</div>
                    <div class="stat-value">
                        <span id="pace">—</span><span class="stat-unit">/km</span>
                    </div>
                </div>
            </div>
            
            <!-- Before start: Start + Locate -->
            <div class="btn-row" id="btnRowIdle">
                <button class="btn btn-primary" onclick="startTracking()">
                    <span class="btn-icon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </span>
                    <span>Start</span>
                </button>
                <button class="btn btn-icon-only" onclick="recenterMap()" title="Center on location">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                        <line x1="12" y1="2" x2="12" y2="4"/>
                        <line x1="12" y1="20" x2="12" y2="22"/>
                        <line x1="2" y1="12" x2="4" y2="12"/>
                        <line x1="20" y1="12" x2="22" y2="12"/>
                    </svg>
                </button>
            </div>
            
            <!-- During activity: Pause + Stop -->
            <div class="btn-row" id="btnRowActive" style="display:none">
                <button class="btn btn-primary" id="pauseBtn" onclick="togglePause()">
                    <span class="btn-icon" id="pauseIcon">
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
                    </span>
                    <span id="pauseLabel">Pause</span>
                </button>
                <button class="btn btn-icon-only" style="background: rgba(255, 71, 87, 0.2); border-color: rgba(255, 71, 87, 0.3);" onclick="finishTracking()" title="Finish">
                    <svg viewBox="0 0 24 24" fill="currentColor" style="color: var(--danger);">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- FINISH SCREEN -->
    <div class="screen hidden" id="finishScreen">
        <div class="finish-header">
            <div class="finish-title">Activity Complete</div>
            <button class="close-btn" onclick="discardAndBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        
        <div class="card-wrapper">
            <div class="card" id="card">
                <div class="card-inner">
                    <div class="card-top">
                        <div class="card-brand">
                            <span class="card-brand-dot"></span>
                            <span>Traila</span>
                        </div>
                        <div class="card-date" id="cardDate">—</div>
                    </div>
                    
                    <div class="card-map">
                        <div id="cardMap"></div>
                        <div class="loading-overlay" id="cardLoading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    
                    <div class="card-stats">
                        <div>
                            <div class="card-stat-label">Distance</div>
                            <div class="card-stat-value">
                                <span id="cardDistance">0.00</span><span class="card-stat-unit">km</span>
                            </div>
                        </div>
                        <div>
                            <div class="card-stat-label">Time</div>
                            <div class="card-stat-value"><span id="cardTime">00:00</span></div>
                        </div>
                        <div>
                            <div class="card-stat-label">Pace</div>
                            <div class="card-stat-value">
                                <span id="cardPace">—</span><span class="card-stat-unit">/km</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-action btn-save" onclick="saveCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                Save Image
            </button>
            <button class="btn-action btn-share" onclick="shareCard()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
                Share
            </button>
        </div>
    </div>
    
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        <span id="toastText">Saved</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let mainMap, cardMap;
        let polyline, glowLine;
        let cardPolyline, cardGlow;
        let watchId;
        let route = [];
        let startTime, endTime, pausedDuration = 0, pauseStart = null;
        let isTracking = false;
        let isPaused = false;
        let timerInterval;
        let lastKnownPosition = null;
        let locationMarker = null;
        
        const themeConfig = {
            tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            lineColor: '#c4f04d',
            glowColor: '#c4f04d',
            markerColor: '#c4f04d'
        };
        
        function initMainMap() {
            mainMap = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([55.7558, 37.6173], 15);
            
            L.tileLayer(themeConfig.tileUrl, { maxZoom: 19 }).addTo(mainMap);
            
            glowLine = L.polyline([], {
                color: themeConfig.glowColor,
                weight: 14,
                opacity: 0.25,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
            
            polyline = L.polyline([], {
                color: themeConfig.lineColor,
                weight: 5,
                opacity: 0.95,
                lineCap: 'round',
                lineJoin: 'round'
            }).addTo(mainMap);
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        lastKnownPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        mainMap.setView([lastKnownPosition.lat, lastKnownPosition.lng], 16);
                    },
                    () => {},
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        }
        
        function recenterMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        lastKnownPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        mainMap.setView([lastKnownPosition.lat, lastKnownPosition.lng], 17, { animate: true });
                        
                        // Add/update location marker (simple, no animation)
                        if (locationMarker) {
                            mainMap.removeLayer(locationMarker);
                        }
                        
                        const markerIcon = L.divIcon({
                            className: '',
                            html: `<div style="
                                width: 16px;
                                height: 16px;
                                border-radius: 50%;
                                background: ${themeConfig.markerColor};
                                border: 3px solid #fff;
                                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                            "></div>`,
                            iconSize: [16, 16],
                            iconAnchor: [8, 8]
                        });
                        
                        locationMarker = L.marker([lastKnownPosition.lat, lastKnownPosition.lng], { icon: markerIcon }).addTo(mainMap);
                        
                        // Remove marker after 3 seconds
                        setTimeout(() => {
                            if (locationMarker) {
                                mainMap.removeLayer(locationMarker);
                                locationMarker = null;
                            }
                        }, 3000);
                    },
                    (err) => {
                        if (lastKnownPosition) {
                            mainMap.panTo([lastKnownPosition.lat, lastKnownPosition.lng], { animate: true });
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }
        
        function startTracking() {
            if (!navigator.geolocation) {
                showToast('Geolocation not supported');
                return;
            }
            
            isTracking = true;
            isPaused = false;
            route = [];
            startTime = Date.now();
            pausedDuration = 0;
            pauseStart = null;
            
            document.getElementById('btnRowIdle').style.display = 'none';
            document.getElementById('btnRowActive').style.display = 'flex';
            document.getElementById('recBadge').classList.add('active');
            
            timerInterval = setInterval(updateLiveStats, 1000);
            
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    lastKnownPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    
                    if (!isPaused) {
                        const p = { lat: pos.coords.latitude, lng: pos.coords.longitude, t: Date.now() };
                        route.push(p);
                        polyline.addLatLng([p.lat, p.lng]);
                        glowLine.addLatLng([p.lat, p.lng]);
                    }
                    mainMap.panTo([pos.coords.latitude, pos.coords.longitude], { animate: true, duration: 0.5 });
                    updateLiveStats();
                },
                (err) => showToast('GPS error: ' + err.message),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }
        
        function togglePause() {
            isPaused = !isPaused;
            const icon = document.getElementById('pauseIcon');
            const label = document.getElementById('pauseLabel');
            
            if (isPaused) {
                pauseStart = Date.now();
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
                label.textContent = 'Resume';
                document.getElementById('recBadge').classList.remove('active');
            } else {
                if (pauseStart) {
                    pausedDuration += Date.now() - pauseStart;
                    pauseStart = null;
                }
                icon.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
                label.textContent = 'Pause';
                document.getElementById('recBadge').classList.add('active');
            }
        }
        
        function finishTracking() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            isTracking = false;
            isPaused = false;
            endTime = Date.now();
            
            document.getElementById('btnRowIdle').style.display = 'flex';
            document.getElementById('btnRowActive').style.display = 'none';
            document.getElementById('recBadge').classList.remove('active');
            
            showFinishScreen();
        }
        
        function discardAndBack() {
            document.getElementById('finishScreen').classList.add('hidden');
            document.getElementById('trackingScreen').classList.remove('hidden');
            route = [];
            polyline.setLatLngs([]);
            glowLine.setLatLngs([]);
            updateLiveStats();
            if (cardMap) {
                cardMap.remove();
                cardMap = null;
            }
        }
        
        function updateLiveStats() {
            const d = calcDistance(route);
            document.getElementById('distance').textContent = d.toFixed(2);
            
            if (startTime) {
                let elapsed = Math.floor((Date.now() - startTime) / 1000);
                if (isPaused && pauseStart) {
                    elapsed -= Math.floor((Date.now() - pauseStart) / 1000);
                }
                elapsed -= Math.floor(pausedDuration / 1000);
                if (elapsed < 0) elapsed = 0;
                
                document.getElementById('time').textContent = fmtTime(elapsed);
                
                if (d > 0.02) {
                    const pace = elapsed / d;
                    document.getElementById('pace').textContent = fmtPace(pace);
                }
            }
        }
        
        function showFinishScreen() {
            document.getElementById('trackingScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            
            const d = calcDistance(route);
            let elapsed = Math.floor(((endTime || Date.now()) - startTime) / 1000);
            elapsed -= Math.floor(pausedDuration / 1000);
            if (elapsed < 0) elapsed = 0;
            
            document.getElementById('cardDistance').textContent = d.toFixed(2);
            document.getElementById('cardTime').textContent = fmtTime(elapsed);
            document.getElementById('cardPace').textContent = d > 0.02 ? fmtPace(elapsed / d) : '—';
            
            const now = new Date(endTime || Date.now());
            const opts = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('cardDate').textContent = now.toLocaleDateString('en-US', opts).toUpperCase();
            
            setTimeout(() => initCardMap(), 200);
        }
        
        function initCardMap() {
            if (cardMap) cardMap.remove();
            
            cardMap = L.map('cardMap', {
                zoomControl: false,
                attributionControl: false,
                dragging: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                touchZoom: false,
                boxZoom: false,
                keyboard: false,
                tap: false
            });
            
            L.tileLayer(themeConfig.tileUrl, { maxZoom: 19 }).addTo(cardMap);
            
            if (route.length > 0) {
                const distance = calcDistance(route);
                const simplifiedRoute = distance > 3 ? simplifyTrack(route, 0.00005) : route;
                
                cardGlow = L.polyline([], {
                    color: themeConfig.glowColor,
                    weight: distance > 5 ? 6 : 10,
                    opacity: distance > 5 ? 0.4 : 0.3,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                cardPolyline = L.polyline([], {
                    color: themeConfig.lineColor,
                    weight: distance > 5 ? 3 : 4,
                    opacity: 1,
                    lineCap: 'round',
                    lineJoin: 'round'
                }).addTo(cardMap);
                
                simplifiedRoute.forEach(p => {
                    cardPolyline.addLatLng([p.lat, p.lng]);
                    cardGlow.addLatLng([p.lat, p.lng]);
                });
                
                const bounds = cardPolyline.getBounds();
                if (bounds.isValid()) {
                    cardMap.fitBounds(bounds, { 
                        padding: [30, 30],
                        maxZoom: 18
                    });
                }
                
                setTimeout(() => cardMap.invalidateSize(), 100);
            }
        }
        
        function simplifyTrack(points, tolerance = 0.0001) {
            if (points.length <= 2) return points;
            
            let maxDist = 0;
            let maxIndex = 0;
            const start = points[0];
            const end = points[points.length - 1];
            
            for (let i = 1; i < points.length - 1; i++) {
                const dist = perpendicularDistance(points[i], start, end);
                if (dist > maxDist) {
                    maxDist = dist;
                    maxIndex = i;
                }
            }
            
            if (maxDist > tolerance) {
                const left = simplifyTrack(points.slice(0, maxIndex + 1), tolerance);
                const right = simplifyTrack(points.slice(maxIndex), tolerance);
                return left.slice(0, -1).concat(right);
            } else {
                return [start, end];
            }
        }
        
        function perpendicularDistance(point, lineStart, lineEnd) {
            const dx = lineEnd.lng - lineStart.lng;
            const dy = lineEnd.lat - lineStart.lat;
            const mag = Math.sqrt(dx * dx + dy * dy);
            
            if (mag === 0) return Math.sqrt((point.lng - lineStart.lng)**2 + (point.lat - lineStart.lat)**2);
            
            const u = ((point.lng - lineStart.lng) * dx + (point.lat - lineStart.lat) * dy) / (mag * mag);
            const x = lineStart.lng + u * dx;
            const y = lineStart.lat + u * dy;
            
            return Math.sqrt((point.lng - x)**2 + (point.lat - y)**2);
        }
        
        // ============ SCREENSHOT RENDERING ============
        async function captureCardAsImage() {
            const card = document.getElementById('card');
            const rect = card.getBoundingClientRect();
            const scale = 2;
            
            const canvas = document.createElement('canvas');
            canvas.width = rect.width * scale;
            canvas.height = rect.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            
            // Draw background gradient
            const gradient = ctx.createLinearGradient(0, 0, rect.width, rect.height);
            gradient.addColorStop(0, '#0f0f14');
            gradient.addColorStop(0.5, '#1a0f24');
            gradient.addColorStop(1, '#0f0f14');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, rect.width, rect.height);
            
            // Draw mesh gradient
            const meshGradient1 = ctx.createRadialGradient(
                rect.width * 0.2, rect.height * 0.3, 0,
                rect.width * 0.2, rect.height * 0.3, rect.width * 0.4
            );
            meshGradient1.addColorStop(0, 'rgba(196, 240, 77, 0.15)');
            meshGradient1.addColorStop(1, 'transparent');
            ctx.fillStyle = meshGradient1;
            ctx.fillRect(0, 0, rect.width, rect.height);
            
            const meshGradient2 = ctx.createRadialGradient(
                rect.width * 0.8, rect.height * 0.7, 0,
                rect.width * 0.8, rect.height * 0.7, rect.width * 0.4
            );
            meshGradient2.addColorStop(0, 'rgba(139, 92, 246, 0.2)');
            meshGradient2.addColorStop(1, 'transparent');
            ctx.fillStyle = meshGradient2;
            ctx.fillRect(0, 0, rect.width, rect.height);
            
            // Render map
            if (cardMap && route.length > 0) {
                const mapCanvas = await renderLeafletMapToCanvas(cardMap, document.getElementById('cardMap'));
                const mapRect = document.getElementById('cardMap').getBoundingClientRect();
                const mapOffset = {
                    x: mapRect.left - rect.left,
                    y: mapRect.top - rect.top
                };
                
                ctx.drawImage(mapCanvas, mapOffset.x, mapOffset.y, mapRect.width, mapRect.height);
            }
            
            // Draw logo
            ctx.font = '600 13px "Space Grotesk", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.textAlign = 'left';
            ctx.fillText('● TRAILA', 28, 40);
            
            // Draw date
            ctx.font = '500 11px "Inter", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.textAlign = 'right';
            ctx.fillText(document.getElementById('cardDate').textContent, rect.width - 28, 40);
            
            // Draw stats
            const statsY = rect.height - 60;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(28, statsY);
            ctx.lineTo(rect.width - 28, statsY);
            ctx.stroke();
            
            const statsData = [
                { label: 'DISTANCE', value: document.getElementById('cardDistance').textContent, unit: 'km' },
                { label: 'TIME', value: document.getElementById('cardTime').textContent, unit: '' },
                { label: 'PACE', value: document.getElementById('cardPace').textContent, unit: '/km' }
            ];
            
            const colWidth = (rect.width - 56) / 3;
            
            statsData.forEach((stat, i) => {
                const x = 28 + i * colWidth;
                
                ctx.font = '600 9px "Inter", sans-serif';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.textAlign = 'left';
                ctx.fillText(stat.label, x, statsY + 20);
                
                ctx.font = '500 24px "Space Grotesk", sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(stat.value, x, statsY + 48);
                
                if (stat.unit) {
                    const valueWidth = ctx.measureText(stat.value).width;
                    ctx.font = '500 11px "Inter", sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.fillText(stat.unit, x + valueWidth + 2, statsY + 48);
                }
            });
            
            return canvas;
        }
        
        async function renderLeafletMapToCanvas(map, container) {
            const rect = container.getBoundingClientRect();
            const scale = 2;
            const canvas = document.createElement('canvas');
            canvas.width = rect.width * scale;
            canvas.height = rect.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            
            ctx.fillStyle = '#0a0a0b';
            ctx.fillRect(0, 0, rect.width, rect.height);
            
            const tilePane = map.getPane('tilePane');
            if (!tilePane) return canvas;
            
            const tiles = tilePane.querySelectorAll('img');
            const promises = [];
            
            tiles.forEach(tile => {
                const style = tile.style;
                const src = tile.src;
                
                const transform = style.transform || style.webkitTransform || '';
                const match = transform.match(/translate3d\(([^,]+),\s*([^,]+),\s*([^)]+)\)/);
                if (!match) return;
                
                const x = parseFloat(match[1]);
                const y = parseFloat(match[2]);
                
                promises.push(new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => {
                        ctx.drawImage(img, x, y, tile.offsetWidth, tile.offsetHeight);
                        resolve();
                    };
                    img.onerror = () => resolve();
                    img.src = src;
                }));
            });
            
            await Promise.all(promises);
            
            if (cardGlow && route.length > 0) {
                drawPolylineOnCanvas(ctx, map, cardGlow, {
                    color: themeConfig.glowColor,
                    weight: calcDistance(route) > 5 ? 6 : 10,
                    opacity: calcDistance(route) > 5 ? 0.4 : 0.3
                });
            }
            if (cardPolyline && route.length > 0) {
                drawPolylineOnCanvas(ctx, map, cardPolyline, {
                    color: themeConfig.lineColor,
                    weight: calcDistance(route) > 5 ? 3 : 4,
                    opacity: 1
                });
            }
            
            return canvas;
        }
        
        function drawPolylineOnCanvas(ctx, map, layer, style) {
            const latlngs = layer.getLatLngs();
            if (latlngs.length < 2) return;
            
            ctx.strokeStyle = style.color;
            ctx.lineWidth = style.weight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = style.opacity;
            
            ctx.beginPath();
            latlngs.forEach((ll, i) => {
                const point = map.latLngToContainerPoint(ll);
                if (i === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
        
        async function saveCard() {
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            try {
                const canvas = await captureCardAsImage();
                
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `traila-${Date.now()}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Saved to downloads');
                }, 'image/png');
            } catch (e) {
                showToast('Export failed');
                console.error(e);
            } finally {
                loading.classList.remove('active');
            }
        }
        
        async function shareCard() {
            const loading = document.getElementById('cardLoading');
            loading.classList.add('active');
            
            try {
                const canvas = await captureCardAsImage();
                
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'traila.png', { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Traila Activity',
                                text: 'Check out my route!'
                            });
                            showToast('Shared');
                        } catch (e) {
                            if (e.name !== 'AbortError') {
                                fallbackShare(canvas);
                            }
                        }
                    } else {
                        fallbackShare(canvas);
                    }
                    loading.classList.remove('active');
                }, 'image/png');
            } catch (e) {
                showToast('Share failed');
                loading.classList.remove('active');
            }
        }
        
        function fallbackShare(canvas) {
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `traila-${Date.now()}.png`;
                a.click();
                showToast('Image saved — share manually');
            });
        }
        
        function calcDistance(pts) {
            if (pts.length < 2) return 0;
            let total = 0;
            const R = 6371;
            for (let i = 1; i < pts.length; i++) {
                const lat1 = pts[i-1].lat * Math.PI / 180;
                const lat2 = pts[i].lat * Math.PI / 180;
                const dLat = (pts[i].lat - pts[i-1].lat) * Math.PI / 180;
                const dLon = (pts[i].lng - pts[i-1].lng) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2)**2;
                total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            return total;
        }
        
        function fmtTime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        
        function fmtPace(secPerKm) {
            const m = Math.floor(secPerKm / 60);
            const s = Math.floor(secPerKm % 60);
            return `${m}:${String(s).padStart(2,'0')}`;
        }
        
        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toastText').textContent = text;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
        
        window.onload = initMainMap;
    </script>
